name: Deploy JokiSure to GCP Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Copy .env and generate app key
        run: |
          cp .env.example .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "CYPRESS_COVERAGE=true" >> .env
          echo "APP_ENV=testing" >> .env
          php artisan config:cache

      # - name: Run Cypress tests
      #   env:
      #     VITE_COVERAGE: 'true'
      #     CYPRESS_COVERAGE: 'true'
      #   run: |
      #     npm ci
      #     npm run build -- --mode test
      #     php artisan serve --port=8000 &
      #     sleep 5
      #     npm run test -- --config baseUrl=http://127.0.0.1:8000
      #     sleep 3
      #     kill %1 || true

      # - name: Print Coverage Summary
      #   run: npx nyc report --reporter=text-summary

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t asia-southeast2-docker.pkg.dev/pso-fp-group4/pso-group4/jokisure:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push asia-southeast2-docker.pkg.dev/pso-fp-group4/pso-group4/jokisure:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy jokisure \
            --image asia-southeast2-docker.pkg.dev/pso-fp-group4/pso-group4/jokisure:${{ github.sha }} \
            --region asia-southeast2 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars APP_URL=https://jokisure-34050340438.asia-southeast2.run.app \
            --set-env-vars ASSET_URL=https://jokisure-34050340438.asia-southeast2.run.app \
            --set-env-vars APP_ENV=production \
            --set-env-vars APP_DEBUG=false \
            --set-env-vars LOG_CHANNEL=stderr \
            --set-env-vars LOG_STACK=gcp \
            --set-env-vars LOG_LEVEL=info \
            --set-env-vars DB_CONNECTION=pgsql \
            --set-env-vars DB_HOST=${{ secrets.DB_HOST }} \
            --set-env-vars DB_PORT=5432 \
            --set-env-vars DB_DATABASE=${{ secrets.DB_DATABASE }} \
            --set-env-vars DB_USERNAME=${{ secrets.DB_USERNAME }} \
            --set-env-vars DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --set-env-vars LOG_STDERR_FORMATTER=Monolog\Formatter\JsonFormatter \
            --set-env-vars APP_KEY=${{ secrets.APP_KEY }}
